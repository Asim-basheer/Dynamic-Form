<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
       font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    /* background-color: #D1D1D1; */
    background-image: url(bgLogo.svg);
    background-repeat: no-repeat;
    background-position: right right;
    background-size: cover;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0;
    padding-bottom: 20px;
    }
 .container{
      width: 100%;
      max-width: 1300px;
      height: auto;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Top bar holding logo and language switcher */
    .top-bar {
      width: 100%;
      /* max-width: 640px; */
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      gap: 16px;
      background-color: white;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      /* border-radius: 16px; */
    }


    .logo-wrapper svg {
      width: 120px;
      height: auto;
      display: block;
    }

    /* Language switcher */
    .lang-switcher {
      position: relative;
    }

    .lang-select {
      appearance: none;
      -webkit-appearance: none;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #093B6D;
      background: #ffffff;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      padding: 9px 36px 9px 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: border-color 0.2s;
      min-width: 130px;
    }

    html[dir="rtl"] .lang-select {
      padding: 9px 14px 9px 36px;
    }

    .lang-select:focus {
      outline: none;
      border-color: #093B6D;
      box-shadow: 0 0 0 3px rgba(9,59,109,0.1);
    }

    .lang-switcher::after {
      content: "▾";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #093B6D;
      pointer-events: none;
      font-size: 12px;
      right: 14px;
    }

    html[dir="rtl"] .lang-switcher::after {
      right: auto;
      left: 14px;
    }

    .form-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 640px;
      padding: 40px 40px 48px;
    }

    .form-title {
      font-size: 22px;
      font-weight: 700;
      color: #093B6D;
      margin-bottom: 8px;
    }

   .form-description {
      font-size: 20px;
      color: #555;
      margin-bottom: 32px;
      line-height: 1.7;
      padding-bottom: 24px;
      padding: 0 10px;
      border: none;
      border-left: 5px solid #38b0a6;
          font-weight: bold;

    }
     html[dir="rtl"] .form-description {
      border: none;
      border-right: 5px solid #38b0a6;
     }

    .field-group {
      margin-bottom: 24px;
    }

    label {
     display: block;
    font-size: 16px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 8px;
    font-weight: bold;
    }

    label .required-star {
      color: #e53e3e;
      margin-inline-end: 4px;
      font-size: 13px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
       padding-left:30px;
    }


    html[dir="rtl"] select {
      padding-right:30px;
    }

    
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    textarea:focus,
    select:focus {
      border-color: #093B6D;
      box-shadow: 0 0 0 3px rgba(9,59,109,0.1);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Select wrapper for custom arrow */
    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: "▾";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #093B6D;
      pointer-events: none;
      font-size: 14px;
      inset-inline-start: 14px;
    }

    /* Radio buttons */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .radio-option, .checkbox-multi-option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s;
      background: #fafafa;
    }

    .radio-option:hover, .checkbox-multi-option:hover {
      border-color: #093B6D;
      background: #f0f4f8;
    }

    .radio-option input[type="radio"],
    .checkbox-multi-option input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #093B6D;
      cursor: pointer;
      flex-shrink: 0;
    }

    .radio-option span, .checkbox-multi-option span {
      font-size: 14px;
      color: #1a1a2e;
      font-weight: 500;
    }

    /* Checkbox single (boolean) */
    .checkbox-single {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .checkbox-single input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #093B6D;
      cursor: pointer;
      flex-shrink: 0;
    }
    .checkbox-single span {
      font-size: 14px;
      color: #1a1a2e;
    }

    /* Section grouping */
    .section-block {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      color: #093B6D;
      margin-bottom: 20px;
      padding-inline-start: 12px;
      border-inline-start: 3px solid #093B6D;
    }

    .section-block .field-group:last-child {
      margin-bottom: 0;
    }

    /* Star rating */
    .star-rating {
      display: flex;
      flex-direction: row-reverse;
      gap: 6px;
      justify-content: flex-end;
    }

    html[dir="ltr"] .star-rating {
      flex-direction: row;
      justify-content: flex-start;
    }

    .star-rating input {
      display: none;
    }

    .star-rating label {
      font-size: 32px;
      color: #d0d0d0;
      cursor: pointer;
      transition: color 0.15s;
      margin-bottom: 0;
      line-height: 1;
    }

    html[dir="rtl"] .star-rating input:checked ~ label,
    html[dir="rtl"] .star-rating label:hover,
    html[dir="rtl"] .star-rating label:hover ~ label {
      color: #f6c90e;
    }

    html[dir="ltr"] .star-rating input:checked ~ label,
    html[dir="ltr"] .star-rating label:hover,
    html[dir="ltr"] .star-rating label:hover ~ label {
      color: #d0d0d0;
    }

    html[dir="ltr"] .star-rating label:hover,
    html[dir="ltr"] .star-rating label:hover ~ label,
    html[dir="ltr"] .star-rating input:checked ~ label {
      color: #f6c90e;
    }

    /* Submit button */
    .submit-btn {
      margin-top: 36px;
      width: 100%;
      padding: 14px;
      background: #093B6D;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .submit-btn:hover { background: #0a4a8a; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
      transform: none;
    }

    /* Status messages */
    .status-msg {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .status-msg.success {
      background: #e6f4ea;
      color: #276a37;
      border: 1.5px solid #a8d5b5;
    }
    .status-msg.error {
      background: #fdecea;
      color: #c0392b;
      border: 1.5px solid #f5b7b1;
    }

    /* Loading overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .form-card { padding: 24px 18px 36px; }
      .top-bar { flex-wrap: wrap; }
    }
  </style>
</head>

    </div>
    <div class="lang-switcher">
      <select class="lang-select" id="langSelect">
        <option value="">...</option>
      </select>
    </div>
  </div>

  <div class="form-card">
    <p class="form-description" id="formDescription">Loading form...</p>
    <div id="formFields"></div>
    <button class="submit-btn" id="submitBtn" style="display:none">Submit</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
     <img src="logo_animated.svg" alt=""  width="80px">
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const FORM_API_URL = 'https://687275e5259aeb808f1baba6125618.40.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/13001f72c4244703bef2ef9a842201c3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=hHnk7ZrHDafpNfl5tTtLMZ9evWjN5kqeB10cmS0Rv-U';

    const LANG_API_URL = 'https://687275e5259aeb808f1baba6125618.40.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4b471ea24d4b4931bd96363e3a09478a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=NuVeqauIYMxPrEbQgjQRECOpsncTKroX4we7pW38Y4Q';

    const DEFAULT_LANG_VALUE = 'EN';
    const LANG_STORAGE_KEY = 'preferred_lang_id';

    // RTL language values (by "value" field from the languages API)
    const RTL_LANG_VALUES = ['AR'];

    // UI text translations (static labels not coming from the form API)
    const UI_TEXT = {
      AR: {
        submit: 'إرسال',
        loading: 'جاري تحميل الاستمارة...',
        loadError: 'تعذّر تحميل الاستمارة. يرجى المحاولة مرة أخرى.',
        submitting: 'جاري الإرسال...',
        submitSuccess: 'تم إرسال الاستمارة بنجاح! شكراً لك.',
        submitError: 'حدث خطأ أثناء الإرسال. يرجى المحاولة مرة أخرى.',
        requiredField: 'يرجى ملء الحقل المطلوب',
        selectPlaceholder: '-- اختر --',
        noFormId: 'لم يتم تحديد رقم الاستمارة في الرابط.',
        item: 'العنصر',
        apply: 'ينطبق'
      },
      EN: {
        submit: 'Submit',
        loading: 'Loading form...',
        loadError: 'Could not load the form. Please try again.',
        submitting: 'Submitting...',
        submitSuccess: 'Form submitted successfully! Thank you.',
        submitError: 'An error occurred while submitting. Please try again.',
        requiredField: 'Please fill in the required field',
        selectPlaceholder: '-- Select --',
        noFormId: 'No form ID was provided in the URL.',
        item: 'Item',
        apply: 'Applies'
      },
      FR: {
        submit: 'Envoyer',
        loading: 'Chargement du formulaire...',
        loadError: 'Impossible de charger le formulaire. Veuillez réessayer.',
        submitting: 'Envoi en cours...',
        submitSuccess: 'Formulaire envoyé avec succès ! Merci.',
        submitError: "Une erreur s'est produite lors de l'envoi. Veuillez réessayer.",
        requiredField: 'Veuillez remplir le champ obligatoire',
        selectPlaceholder: '-- Sélectionner --',
        noFormId: "Aucun identifiant de formulaire n'a été fourni dans l'URL.",
        item: 'Élément',
        apply: 'Applicable'
      }
    };

    // ============================================================
    // STATE
    // ============================================================
    let formData = null;
    let languages = [];
    let currentLang = null; // the full language object { display_name, id, value }

    // ============================================================
    // HELPERS
    // ============================================================

    // Get form ID from URL query string: ?id=234234
    function getFormIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    function t(key) {
      const langValue = (currentLang && currentLang.value) || DEFAULT_LANG_VALUE;
      const dict = UI_TEXT[langValue] || UI_TEXT[DEFAULT_LANG_VALUE];
      return dict[key] || UI_TEXT[DEFAULT_LANG_VALUE][key] || key;
    }

    function applyDirection(langValue) {
      const dir = RTL_LANG_VALUES.includes(langValue) ? 'rtl' : 'ltr';
      document.documentElement.setAttribute('dir', dir);
      document.documentElement.setAttribute('lang', langValue.toLowerCase());
    }

    function saveLangPreference(langId) {
      try {
        localStorage.setItem(LANG_STORAGE_KEY, langId);
      } catch (e) {
        console.warn('Could not save language preference', e);
      }
    }

    function getSavedLangPreference() {
      try {
        return localStorage.getItem(LANG_STORAGE_KEY);
      } catch (e) {
        return null;
      }
    }

    // ============================================================
    // LANGUAGE LOADING & SWITCHING
    // ============================================================
    async function loadLanguages() {
      try {
        const res = await fetch(LANG_API_URL, {
          method: 'GET'
        });
        if (!res.ok) throw new Error('Failed to load languages');
        languages = await res.json();
      } catch (err) {
        console.error(err);
        // Fallback minimal language list so the app still works
        languages = [
          { display_name: 'English', id: '2da98536-4a63-f111-ab0c-70a8a52055db', value: 'EN' },
          { display_name: 'Arabic', id: '2fa98536-4a63-f111-ab0c-70a8a52055db', value: 'AR' }
        ];
      }

      populateLangSelect();
      determineInitialLang();
    }

    function populateLangSelect() {
      const select = document.getElementById('langSelect');
      select.innerHTML = '';
      languages.forEach(lang => {
        const opt = document.createElement('option');
        opt.value = lang.id;
        opt.textContent = lang.display_name;
        select.appendChild(opt);
      });
    }

    function determineInitialLang() {
      const savedId = getSavedLangPreference();
      let lang = null;

      if (savedId) {
        lang = languages.find(l => l.id === savedId);
      }

      if (!lang) {
        lang = languages.find(l => l.value === DEFAULT_LANG_VALUE) || languages[0];
      }

      setCurrentLang(lang, false);
    }

    function setCurrentLang(lang, shouldReload) {
      currentLang = lang;
      document.getElementById('langSelect').value = lang.id;
      applyDirection(lang.value);
      saveLangPreference(lang.id);
      updateStaticText();

      if (shouldReload) {
        loadForm();
      }
    }

    function updateStaticText() {
      document.getElementById('submitBtn').textContent = t('submit');

      // If the form hasn't loaded yet, show the loading text in the new language
      if (!formData) {
        document.getElementById('formDescription').textContent = t('loading');
      }
    }

    // ============================================================
    // FORM LOADING
    // ============================================================
    async function loadForm() {
      const formId = getFormIdFromUrl();

      if (!formId) {
        document.getElementById('formDescription').textContent = t('noFormId');
        document.getElementById('formFields').innerHTML = '';
        document.getElementById('submitBtn').style.display = 'none';
        return;
      }

      const overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('active');
      document.getElementById('formDescription').textContent = t('loading');
      document.getElementById('formFields').innerHTML = '';
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('statusMsg').style.display = 'none';

      try {
        const res = await fetch(FORM_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            formID: formId,
            lang: currentLang.id
          })
        });
        if (!res.ok) throw new Error('Failed to load form');
        const data = await res.json();
        formData = data;
        renderForm(data);
      } catch (err) {
        document.getElementById('formDescription').textContent = t('loadError');
        console.error(err);
      } finally {
        overlay.classList.remove('active');
      }
    }

    function renderForm(data) {
      document.getElementById('formDescription').textContent = data.description || '';
      const container = document.getElementById('formFields');
      container.innerHTML = '';

      const sorted = [...data.questions].sort((a, b) => a.order - b.order);

      // Group consecutive questions that share the same non-null "section" value
      // into a single visual block. Questions with section === null/undefined
      // render individually as before.
      const blocks = [];
      let currentBlock = null;

      sorted.forEach(q => {
        const sectionKey = q.section || null;

        if (sectionKey === null) {
          blocks.push({ section: null, questions: [q] });
          currentBlock = null;
          return;
        }

        if (currentBlock && currentBlock.section === sectionKey) {
          currentBlock.questions.push(q);
        } else {
          currentBlock = { section: sectionKey, questions: [q] };
          blocks.push(currentBlock);
        }
      });

      blocks.forEach(block => {
        if (block.section) {
          container.appendChild(buildSectionTable(block.section, block.questions));
        } else {
          const group = document.createElement('div');
          group.className = 'field-group';
          group.innerHTML = buildField(block.questions[0]);
          container.appendChild(group);
        }
      });

      document.getElementById('submitBtn').textContent = t('submit');
      document.getElementById('submitBtn').style.display = 'block';
      document.getElementById('submitBtn').disabled = false;
    }

    // Builds a table-style section block: a title, then a header row with the
    // Groups questions under a section title, each rendered normally via buildField
    function buildSectionTable(sectionTitle, questions) {
      const wrapper = document.createElement('div');
      wrapper.className = 'section-block';

      if (sectionTitle) {
        const heading = document.createElement('h3');
        heading.className = 'section-title';
        heading.textContent = sectionTitle;
        wrapper.appendChild(heading);
      }

      questions.forEach(q => {
        const group = document.createElement('div');
        group.className = 'field-group';
        group.innerHTML = buildField(q);
        wrapper.appendChild(group);
      });

      return wrapper;
    }

    function buildField(q) {
      const req = q.required ? '<span class="required-star">*</span>' : '';
      const label = `<label for="field_${q.id}">${req}${q.text}</label>`;

      switch (q.type) {
        case 'Single Line Text':
          return label + `<input type="text" id="field_${q.id}" data-qid="${q.id}" placeholder="${q.text}" ${q.required ? 'required' : ''} />`;

        case 'Multi Line Text':
          return label + `<textarea id="field_${q.id}" data-qid="${q.id}" placeholder="${q.text}" ${q.required ? 'required' : ''}></textarea>`;

        case 'Number':
          return label + `<input type="number" id="field_${q.id}" data-qid="${q.id}" placeholder="0" ${q.required ? 'required' : ''} />`;

        case 'Date':
          return label + `<input type="date" id="field_${q.id}" data-qid="${q.id}" ${q.required ? 'required' : ''} />`;

        case 'Radio': {
          const opts = q.options.map(o =>
            `<label class="radio-option">
              <input type="radio" name="field_${q.id}" value="${o.id}" data-qid="${q.id}" ${q.required ? 'required' : ''} />
              <span>${o.label}</span>
            </label>`
          ).join('');
          return label + `<div class="radio-group">${opts}</div>`;
        }

        case 'Select': {
          const opts = q.options.map(o => `<option value="${o.id}">${o.label}</option>`).join('');
          return label + `<div class="select-wrapper"><select id="field_${q.id}" data-qid="${q.id}" ${q.required ? 'required' : ''}>
            <option value="">${t('selectPlaceholder')}</option>
            ${opts}
          </select></div>`;
        }

        case 'Multi Select': {
          const opts = q.options.map(o =>
            `<label class="checkbox-multi-option">
              <input type="checkbox" value="${o.id}" data-qid="${q.id}" />
              <span>${o.label}</span>
            </label>`
          ).join('');
          return label + `<div class="radio-group">${opts}</div>`;
        }

        case 'Checkbox':
          return `<label class="checkbox-single">
            <input type="checkbox" id="field_${q.id}" data-qid="${q.id}" />
            <span>${q.text}</span>
          </label>`;

        case 'Rating': {
          const stars = [5,4,3,2,1].map(n =>
            `<input type="radio" name="field_${q.id}" id="star_${q.id}_${n}" value="${n}" data-qid="${q.id}" />
             <label for="star_${q.id}_${n}">&#9733;</label>`
          ).join('');
          return label + `<div class="star-rating">${stars}</div>`;
        }

        default:
          return label + `<input type="text" id="field_${q.id}" data-qid="${q.id}" />`;
      }
    }

    // ============================================================
    // SUBMISSION
    // ============================================================
    function collectAnswers() {
      if (!formData) return null;
      const answers = {};

      formData.questions.forEach(q => {
        switch (q.type) {
          case 'Single Line Text':
          case 'Multi Line Text':
          case 'Number':
          case 'Date': {
            const el = document.querySelector(`[data-qid="${q.id}"]`);
            answers[q.id] = el ? el.value : '';
            break;
          }
          case 'Radio': {
            const checked = document.querySelector(`input[name="field_${q.id}"]:checked`);
            answers[q.id] = checked ? checked.value : '';
            break;
          }
          case 'Select': {
            const el = document.querySelector(`[data-qid="${q.id}"]`);
            answers[q.id] = el ? el.value : '';
            break;
          }
          case 'Multi Select': {
            const checked = [...document.querySelectorAll(`input[data-qid="${q.id}"]:checked`)];
            answers[q.id] = checked.map(c => c.value);
            break;
          }
          case 'Checkbox': {
            const el = document.querySelector(`[data-qid="${q.id}"]`);
            answers[q.id] = el ? el.checked : false;
            break;
          }
          case 'Rating': {
            const checked = document.querySelector(`input[name="field_${q.id}"]:checked`);
            answers[q.id] = checked ? parseInt(checked.value) : 0;
            break;
          }
        }
      });

      return answers;
    }

    function validateAnswers(answers) {
      for (const q of formData.questions) {
        if (!q.required) continue;
        const val = answers[q.id];
        if (q.type === 'Checkbox') continue; // checkbox boolean always valid
        if (q.type === 'Multi Select' && Array.isArray(val) && val.length === 0) return q.text;
        if (q.type === 'Rating' && (val === 0 || val === '')) return q.text;
        if (!val || val === '') return q.text;
      }
      return null;
    }

    async function submitForm() {
      const formId = getFormIdFromUrl();
      if (!formId || !formData) return;

      const answers = collectAnswers();
      if (!answers) return;

      const missing = validateAnswers(answers);
      if (missing) {
        showStatus(`${t('requiredField')}: "${missing}"`, 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      const overlay = document.getElementById('loadingOverlay');
      btn.disabled = true;
      overlay.classList.add('active');

      const payload = {
        formID: formId,
        lang: currentLang.id,
        answers
      };

      try {
        const res = await fetch(FORM_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('Submit failed');
        showStatus(t('submitSuccess'), 'success');
        btn.style.display = 'none';
      } catch (err) {
        showStatus(t('submitError'), 'error');
        btn.disabled = false;
      } finally {
        overlay.classList.remove('active');
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg ' + type;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ============================================================
    // EVENT LISTENERS & INIT
    // ============================================================
    document.getElementById('langSelect').addEventListener('change', (e) => {
      const selectedId = e.target.value;
      const lang = languages.find(l => l.id === selectedId);
      if (lang) {
        setCurrentLang(lang, true);
      }
    });

    document.getElementById('submitBtn').addEventListener('click', submitForm);

    (async function init() {
      await loadLanguages();
      await loadForm();
    })();
  </script>
</body>
</html>
